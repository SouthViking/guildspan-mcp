name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff lint checks
        run: python -m ruff check --output-format=github src tests

      - name: Check Ruff formatting
        run: python -m ruff format --check --diff src tests

      - name: Run type checks
        run: python -m mypy src tests

      - name: Run tests with branch coverage
        run: >-
          python -m pytest
          --cov=guildspan
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build validation tools
        run: python -m pip install build check-wheel-contents twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate package metadata and wheel contents
        run: |
          python -m twine check dist/*
          python -m check_wheel_contents dist/*.whl

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guildspan-dist-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14
